<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<f:view>
    <h:head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Student Registration Form</title>
        <h:outputStylesheet library="css" name="navbar.css?#{applicationScope.appVersion}"/>
        <h:outputStylesheet library="css" name="StudentRegistration.css?#{applicationScope.appVersion}"/>
        <h:outputScript library="script" name="script.js" target="body"/>
    </h:head>
    <h:body>

        <!-- ── Navbar ───────────────────────────────────────────────── -->
        <ui:param name="currentPage" value="#{request.servletPath}"/>

        <!-- DESKTOP / TABLET NAVBAR -->
        <div class="nav-bar">
            <div class="nav-Menu">

                <!-- Logo -->
                <div class="H2-title">
                    <h2>Student Management System</h2>
                </div>

                <!-- Desktop / Tablet: horizontal links -->
                <div class="nav-list">
                    <h:link outcome="admin_page"
                            value="Home"
                            styleClass="#{currentPage.contains('admin_page') ? 'active' : ''}"/>
                    <h:link outcome="studentRegistration"
                            value="Registration"
                            styleClass="#{currentPage.contains('studentRegistration') ? 'active' : ''}"/>
                    <h:link outcome="studentList"
                            value="Show Student List"
                            styleClass="#{currentPage.contains('studentList') ? 'active' : ''}"/>
                    <h:link outcome="subjectEntry"
                            value="Subject List"
                            styleClass="#{currentPage.contains('subjectEntry') ? 'active' : ''}"/>
                    <h:link outcome="studentSubjectList"
                            value="Students Subject"
                            styleClass="#{currentPage.contains('studentSubjectList') ? 'active' : ''}"/>
                    <h:form style="display:contents;">
                        <h:commandLink action="#{adminLoginBean.logout}"
                                       value="Logout"
                                       styleClass="logout"/>
                    </h:form>
                    <button id="theme-toggle"
                            class="theme-toggle"
                            type="button"
                            aria-label="Switch theme">🌕</button>
                </div>

                <!-- Mobile: hamburger button -->
                <!-- FIX: <span class="bar"/> → <span class="bar"></span> (XHTML rule) -->
                <button class="nav-hamburger"
                        id="nav-hamburger"
                        type="button"
                        aria-label="Open menu"
                        aria-expanded="false"
                        aria-controls="nav-mobile-menu">
                    <span class="bar">

                    </span>
                    <span class="bar">

                    </span>
                    <span class="bar">

                    </span>
                </button>

            </div>
        </div>

        <!-- MOBILE DROPDOWN MENU -->
        <nav class="nav-mobile-menu" id="nav-mobile-menu" aria-label="Mobile navigation">
            <ul>
                <li>
                    <h:link outcome="admin_page"
                            value="🏠  Home"
                            styleClass="#{currentPage.contains('admin_page') ? 'active' : ''}"/>
                </li>
                <li>
                    <h:link outcome="studentRegistration"
                            value="📝  Registration"
                            styleClass="#{currentPage.contains('studentRegistration') ? 'active' : ''}"/>
                </li>
                <li>
                    <h:link outcome="studentList"
                            value="👥  Show Student List"
                            styleClass="#{currentPage.contains('studentList') ? 'active' : ''}"/>
                </li>
                <li>
                    <h:link outcome="subjectEntry"
                            value="📚  Subject List"
                            styleClass="#{currentPage.contains('subjectEntry') ? 'active' : ''}"/>
                </li>
                <li>
                    <h:link outcome="studentSubjectList"
                            value="🔗  Students Subject"
                            styleClass="#{currentPage.contains('studentSubjectList') ? 'active' : ''}"/>
                </li>
                <li class="nav-divider">

                </li>
                <li>
                    <h:form style="display:contents;">
                        <h:commandLink action="#{adminLoginBean.logout}"
                                       value="⏻  Logout"
                                       styleClass="logout-mobile"/>
                    </h:form>
                </li>
            </ul>
            <div class="nav-mobile-footer">
                <span>Switch Theme</span>
                <button id="theme-toggle-mobile"
                        class="theme-toggle-mobile"
                        type="button"
                        aria-label="Switch theme">🌕</button>
            </div>
        </nav>

        <!-- Invisible backdrop — click to close menu -->
        <div class="nav-backdrop" id="nav-backdrop">

        </div>

        <!-- ── Page wrapper ─────────────────────────────────────────── -->
        <div class="student-form-wrapper">

            <h:form styleClass="student-form">

                <h2 class="form-title">Student Registration</h2>
                <p class="form-subtitle">Fill in the details below to register a new student.</p>
                <div class="form-divider">

                </div>

                <!-- Global messages: success=green, error=red -->
                <h:messages globalOnly="true" showDetail="true"
                            infoClass="message message--success"
                            errorClass="message message--error"/>

                <!-- Student ID -->
                <div class="form-group">
                    <h:outputLabel value="Student ID" for="sid"/>
                    <h:inputText id="sid"
                                 value="#{studentBean.student.student_id}"
                                 required="true"
                                 requiredMessage="Student ID is required."
                                 p:placeholder="e.g. 2024-CSE-001"/>
                    <h:message for="sid" styleClass="field-error"/>
                </div>

                <!-- Full Name -->
                <div class="form-group">
                    <h:outputLabel value="Full Name" for="sname"/>
                    <h:inputText id="sname"
                                 value="#{studentBean.student.name}"
                                 required="true"
                                 requiredMessage="Full name is required."
                                 p:placeholder="Enter full name"/>
                    <h:message for="sname" styleClass="field-error"/>
                </div>

                <!-- Gender + Phone -->
                <div class="form-row">
                    <div class="form-group">
                        <h:outputLabel value="Gender" for="sgender"/>
                        <h:selectOneMenu id="sgender"
                                         value="#{studentBean.student.gender}"
                                         required="true"
                                         requiredMessage="Please select a gender.">
                            <f:selectItem itemValue="" itemLabel="-- Select --" noSelectionOption="true"/>
                            <f:selectItem itemValue="Male"   itemLabel="Male"/>
                            <f:selectItem itemValue="Female" itemLabel="Female"/>
                            <f:selectItem itemValue="Other"  itemLabel="Other"/>
                        </h:selectOneMenu>
                        <h:message for="sgender" styleClass="field-error"/>
                    </div>
                    <div class="form-group">
                        <h:outputLabel value="Phone" for="sphone"/>
                        <h:inputText id="sphone"
                                     value="#{studentBean.student.phone}"
                                     required="true"
                                     requiredMessage="Phone number is required."
                                     p:placeholder="+880 17XX XXX XXX"/>
                        <h:message for="sphone" styleClass="field-error"/>
                    </div>
                </div>

                <!-- Batch + Date of Birth -->
                <div class="form-row">
                    <div class="form-group">
                        <h:outputLabel value="Batch" for="sbatch"/>
                        <h:inputText id="sbatch"
                                     value="#{studentBean.student.batch}"
                                     required="true"
                                     requiredMessage="Batch is required."
                                     p:placeholder="e.g. 2024"/>
                        <h:message for="sbatch" styleClass="field-error"/>
                    </div>
                    <div class="form-group">
                        <h:outputLabel value="Date of Birth" for="sdate"/>
                        <h:inputText id="sdate"
                                     value="#{studentBean.student.date_of_birth}"
                                     required="true"
                                     requiredMessage="Date of birth is required."
                                     p:placeholder="YYYY-MM-DD"/>
                        <h:message for="sdate" styleClass="field-error"/>
                    </div>
                </div>

                <!-- Address -->
                <div class="form-group">
                    <h:outputLabel value="Address" for="saddress"/>
                    <h:inputText id="saddress"
                                 value="#{studentBean.student.address}"
                                 required="true"
                                 requiredMessage="Address is required."
                                 p:placeholder="House, Road, City"/>
                    <h:message for="saddress" styleClass="field-error"/>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <h:outputLabel value="Password" for="spass"/>
                    <div class="password-field">
                        <h:inputSecret id="spass"
                                       value="#{studentBean.student.password}"
                                       required="true"
                                       requiredMessage="Password is required."
                                       p:placeholder="Create a strong password"
                                       p:autocomplete="new-password"/>
                        <button type="button" class="password-toggle"
                                aria-label="Show password" aria-pressed="false">
                            <span class="password-toggle-icon" aria-hidden="true">
                                <svg class="icon-eye" viewBox="0 0 24 24" focusable="false">
                                    <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="icon-eye-off" viewBox="0 0 24 24" focusable="false">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-6.4 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.4 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <h:message for="spass" styleClass="field-error"/>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <h:outputLabel value="Confirm Password" for="cpass"/>
                    <div class="password-field">
                        <h:inputSecret id="cpass"
                                       value="#{studentBean.confirmPassword}"
                                       required="true"
                                       requiredMessage="Confirm password is required."
                                       p:placeholder="Confirm the password"
                                       p:autocomplete="new-password"/>
                        <button type="button" class="password-toggle"
                                aria-label="Show password" aria-pressed="false">
                            <span class="password-toggle-icon" aria-hidden="true">
                                <svg class="icon-eye" viewBox="0 0 24 24" focusable="false">
                                    <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="icon-eye-off" viewBox="0 0 24 24" focusable="false">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-6.4 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.4 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <h:message for="cpass" styleClass="field-error"/>
                </div>

                <!-- Submit -->
                <h:commandButton value="Save Student"
                                 action="#{studentBean.saveStudent}"
                                 styleClass="save-btn"/>

            </h:form>
        </div>

    </h:body>
</f:view>
</html>
